name: unci-maka-py
channels:
  - conda-forge

dependencies:
  - python=3.12

  # Core scientific stack (mirrors root environment.yml)
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - geopandas       # pulls in shapely, pyproj, fiona
  - rioxarray       # pulls in affine, xarray
  - rasterio        # pulls in gdal
  - gdal            # explicitly imported as osgeo.gdal
  - xarray
  - dask            # lazy loading backend for earthaccess/rioxarray
  - folium
  - holoviews
  - hvplot          # pulls in bokeh
  - earthaccess     # pulls in requests, fsspec, aiohttp
  - scipy           # spatial operations (label, binary_fill_holes)
  - pynhd           # NHDPlus flowlines via NLDI
  - py3dep          # USGS 3DEP DEM access
  - pysheds         # DEM hydrological processing + HAND computation

  # Docker/CyVerse JupyterLab infrastructure
  - jupyterlab
  - notebook
  - ipython
  - ipykernel
  - nb_conda_kernels
  - papermill
  - autopep8
  - jupyterlab-geojson
  - openssh           # needed for openssl bin path (RStudio compatibility)

  - pip
  - pip:
      - localtileserver
